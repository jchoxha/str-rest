<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>str.rest</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages). Pages serves this
      404 for any unknown path; we redirect to the app root, encoding the
      original path so index.html can restore it client-side. pathSegmentsToKeep
      = 1 keeps the `/str-rest/` project-page prefix.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
